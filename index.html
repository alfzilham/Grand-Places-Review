<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Explore the world's most magnificent mosques - From the grand Istiqlal Mosque in Jakarta to the holy Ka'bah in Mecca, discover Islamic architecture wonders." />
    <meta name="theme-color" content="#0A0806" />
    <title>Explore World's Greatest Mosques</title>
    <!-- Anti-copy and DevTools protection -->
    <script>
        // Disable right-click context menu
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });

        // Disable image context menu (prevent save/copy)
        document.addEventListener('contextmenu', function(e) {
            if (e.target.tagName === 'IMG') {
                e.preventDefault();
                return false;
            }
        });

        // Prevent image dragging
        document.addEventListener('dragstart', function(e) {
            if (e.target.tagName === 'IMG') {
                e.preventDefault();
                return false;
            }
        });

        // Prevent copy
        document.addEventListener('copy', function(e) {
            e.preventDefault();
            return false;
        });

        // Prevent cut
        document.addEventListener('cut', function(e) {
            e.preventDefault();
            return false;
        });

        // Prevent paste
        document.addEventListener('paste', function(e) {
            e.preventDefault();
            return false;
        });

        // Disable keyboard shortcuts for DevTools
        document.addEventListener('keydown', function(e) {
            // F12
            if (e.key === 'F12') {
                e.preventDefault();
                return false;
            }
            // Ctrl+Shift+I (DevTools)
            if (e.ctrlKey && e.shiftKey && e.key === 'I') {
                e.preventDefault();
                return false;
            }
            // Ctrl+Shift+J (Console)
            if (e.ctrlKey && e.shiftKey && e.key === 'J') {
                e.preventDefault();
                return false;
            }
            // Ctrl+Shift+C (Inspector)
            if (e.ctrlKey && e.shiftKey && e.key === 'C') {
                e.preventDefault();
                return false;
            }
            // Ctrl+Shift+K (DevTools)
            if (e.ctrlKey && e.shiftKey && e.key === 'K') {
                e.preventDefault();
                return false;
            }
            // Ctrl+U (View Source)
            if (e.ctrlKey && e.key === 'u') {
                e.preventDefault();
                return false;
            }
            // Ctrl+U (View Source) - uppercase
            if (e.ctrlKey && e.key === 'U') {
                e.preventDefault();
                return false;
            }
            // Ctrl+S (Save)
            if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                return false;
            }
            // Ctrl+P (Print)
            if (e.ctrlKey && e.key === 'p') {
                e.preventDefault();
                return false;
            }
            // Ctrl+Shift+E (Network)
            if (e.ctrlKey && e.shiftKey && e.key === 'E') {
                e.preventDefault();
                return false;
            }
            // Ctrl+Shift+F (Find)
            if (e.ctrlKey && e.shiftKey && e.key === 'F') {
                e.preventDefault();
                return false;
            }
            // Ctrl+Shift+M (Mobile Emulator)
            if (e.ctrlKey && e.shiftKey && e.key === 'M') {
                e.preventDefault();
                return false;
            }
            // Ctrl+Shift+N (Incognito)
            if (e.ctrlKey && e.shiftKey && e.key === 'N') {
                e.preventDefault();
                return false;
            }
        });

        // Prevent developer tools detection and blocking
        // Check for DevTools panel opening
        (function() {
            var checkDevTools = function() {
                var threshold = 160;
                var widthThreshold = window.outerWidth - window.innerWidth > threshold;
                var heightThreshold = window.outerHeight - window.innerHeight > threshold;
                
                if (widthThreshold || heightThreshold) {
                    // DevTools is open - try to close or redirect
                    document.body.innerHTML = '<div style="display:flex;justify-content:center;align-items:center;height:100vh;background:#0A0806;color:#C9A84C;font-family:sans-serif;text-align:center;padding:20px;"><div><h1>Developer Tools Detected</h1><p>Please close developer tools to continue viewing this site.</p></div></div>';
                }
            };

            setInterval(checkDevTools, 1000);
        })();

        // Disable text selection on entire page (optional - can be removed if text selection is needed)
        document.addEventListener('selectstart', function(e) {
            // Uncomment the next line to disable text selection entirely
            // e.preventDefault();
        });
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@700;800;900&family=Jost:wght@100;200;300&display=swap"
        rel="stylesheet">
    <style>
        /* ─── CSS VARIABLES (Theme Consistency) ─── */
        :root {
            --gold: #C9A84C;
            --gold-light: #E8CB7A;
            --gold-dim: rgba(201, 168, 76, 0.25);
            --white: #F5F0E8;
            --cream: #EDE3D0;
            --dark: #0A0806;
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-shadow: rgba(0, 0, 0, 0.4);
            
            /* Spacing variables */
            --space-xs: 8px;
            --space-sm: 16px;
            --space-md: 24px;
            --space-lg: 48px;
            --space-xl: 80px;
        }

        /* ─── BASE RESET ─── */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--dark);
            font-family: 'Barlow', sans-serif;
            cursor: default;
        }

        /* ─── INTRO SECTION ─── */
        #intro {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            cursor: pointer;
            will-change: transform;
            transition: transform 0.95s cubic-bezier(0.76, 0, 0.24, 1);
            overflow: hidden;
            z-index: 1000;
        }

        /* Background image layer */
        #intro-bg {
            position: absolute;
            inset: 0;
            background-image: url('image/bg/intro.png');
            background-size: cover;
            background-position: center;
            transform: scale(1.04);
            transition: transform 12s ease-out;
            animation: subtleZoom 14s ease-out forwards;
        }

        @keyframes subtleZoom {
            from {
                transform: scale(1.08);
            }
            to {
                transform: scale(1.02);
            }
        }

        /* Dark overlay */
        #intro-overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center,
                    rgba(0, 0, 0, 0.18) 0%,
                    rgba(0, 0, 0, 0.42) 70%,
                    rgba(0, 0, 0, 0.62) 100%);
        }

        /* Noise texture for cinematic grain */
        #intro-noise {
            position: absolute;
            inset: 0;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-size: 180px 180px;
            pointer-events: none;
        }

        /* Center content */
        #intro-content {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: var(--space-md);
        }

        #intro-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 100;
            font-size: clamp(2.2rem, 6vw, 5rem);
            color: var(--white);
            letter-spacing: 0.3em;
            text-shadow:
                0 2px 30px rgba(0, 0, 0, 0.5),
                0 1px 4px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transform: translateY(14px);
            animation: fadeUp 1.4s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
            user-select: none;
            text-align: center;
        }

        /* Thin decorative line below title */
        #intro-line {
            width: 0;
            height: 1px;
            background: rgba(255, 255, 255, 0.45);
            animation: lineExpand 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.9s forwards;
        }

        /* Subtle "click anywhere" hint */
        #intro-hint {
            position: absolute;
            bottom: 48px;
            left: 40%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            opacity: 0;
            animation: fadeUp 1s ease 1.8s forwards;
        }

        #intro-hint span {
            font-family: 'Jost', sans-serif;
            font-weight: 200;
            font-size: 0.65rem;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.55);
            user-select: none;
            white-space: nowrap;
        }

        /* Animated chevron */
        .chevron-wrap {
            display: flex;
            flex-direction: column;
            gap: 3px;
            animation: float 2.2s ease-in-out infinite;
        }

        .chevron {
            width: 14px;
            height: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.45);
            border-right: 1px solid rgba(255, 255, 255, 0.45);
            transform: rotate(-45deg) translateX(3px);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes lineExpand {
            from {
                width: 0;
            }
            to {
                width: clamp(60px, 12vw, 140px);
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-6px);
            }
        }

        /* Slide-up exit */
        #intro.slide-out {
            transform: translateY(-100%);
        }

        /* Slight blur on bg during exit for premium feel */
        #intro.slide-out #intro-bg {
            filter: blur(2px);
            transform: scale(1.06);
            transition: transform 0.95s cubic-bezier(0.76, 0, 0.24, 1),
                filter 0.95s ease;
        }

        /* ─── NAVIGATION (Hidden initially, shown after intro) ─── */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 28px 48px;
            width: 100%;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s ease;
            background: linear-gradient(to bottom, rgba(10, 8, 6, 0.8) 0%, transparent 100%);
        }

        nav.visible {
            opacity: 1;
            visibility: visible;
        }

        .nav-logo {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            font-size: 1.25rem;
            color: var(--white);
            letter-spacing: 0.35em;
            text-transform: uppercase;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: opacity 0.3s ease;
        }

        .nav-logo:hover {
            opacity: 0.8;
        }

        .nav-logo span {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--gold);
            margin-bottom: 1px;
        }

        .nav-pill {
            display: flex;
            align-items: center;
            gap: 4px;
            background: var(--glass-bg);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 8px 12px;
            box-shadow: 0 8px 32px var(--glass-shadow);
        }

        .nav-pill a {
            color: rgba(245, 240, 232, 0.78);
            text-decoration: none;
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 7px 18px;
            border-radius: 30px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .nav-pill a:hover,
        .nav-pill a.active {
            color: var(--dark);
            background: var(--white);
        }

        /* Mobile hamburger menu */
        .hamburger {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 44px;
            height: 44px;
            background: var(--glass-bg);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            cursor: pointer;
            padding: 12px;
            gap: 5px;
            transition: all 0.3s ease;
            z-index: 200;
        }

        .hamburger:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        .hamburger span {
            display: block;
            width: 20px;
            height: 2px;
            background: var(--white);
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }

        /* Mobile menu overlay */
        .mobile-menu-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 8, 6, 0.98);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 150;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 28px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
        }

        .mobile-menu-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .mobile-menu-overlay a {
            font-family: 'Barlow', sans-serif;
            font-size: 1.5rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--white);
            text-decoration: none;
            padding: 12px 24px;
            transition: all 0.3s ease;
        }

        .mobile-menu-overlay a:hover,
        .mobile-menu-overlay a.active {
            color: var(--gold);
        }

        /* ─── RESPONSIVE STYLES ─── */

        /* Tablet Breakpoint (max-width: 900px) */
        @media (max-width: 900px) {
            nav {
                padding: 20px 24px;
                background: linear-gradient(to bottom, rgba(10, 8, 6, 0.9) 0%, rgba(10, 8, 6, 0.4) 60%, transparent 100%);
            }

            .nav-pill {
                display: none;
            }

            .hamburger {
                display: flex;
            }

            #intro-title {
                letter-spacing: 0.2em;
            }

            #intro-hint {
                bottom: 36px;
            }
        }

        /* Mobile Breakpoint (max-width: 600px) */
        @media (max-width: 600px) {
            nav {
                padding: 16px 20px;
            }

            .nav-logo {
                font-size: 1rem;
                letter-spacing: 0.25em;
            }

            .hamburger {
                width: 40px;
                height: 40px;
                padding: 10px;
            }

            .hamburger span {
                width: 18px;
            }

            #intro-title {
                font-size: clamp(1.8rem, 8vw, 3rem);
                letter-spacing: 0.15em;
                padding: 0 16px;
            }

            #intro-content {
                gap: 16px;
            }

            #intro-hint {
                bottom: 28px;
            }

            #intro-hint span {
                font-size: 0.6rem;
                letter-spacing: 0.25em;
            }

            .mobile-menu-overlay a {
                font-size: 1.25rem;
            }
        }

        /* Extra Small Devices (max-width: 400px) */
        @media (max-width: 400px) {
            nav {
                padding: 14px 16px;
            }

            .nav-logo {
                font-size: 0.9rem;
                letter-spacing: 0.2em;
            }

            .hamburger {
                width: 36px;
                height: 36px;
                padding: 8px;
            }

            .hamburger span {
                width: 16px;
            }

            #intro-title {
                font-size: clamp(1.5rem, 10vw, 2.2rem);
            }

            #intro-hint {
                bottom: 24px;
            }

            #intro-hint span {
                font-size: 0.55rem;
            }

            .chevron {
                width: 12px;
                height: 12px;
            }
        }

        /* Landscape orientation adjustments for mobile */
        @media (max-height: 500px) and (orientation: landscape) {
            #intro-content {
                flex-direction: row;
                gap: 24px;
            }

            #intro-title {
                font-size: clamp(1.5rem, 5vw, 2.5rem);
            }

            #intro-hint {
                bottom: 20px;
            }
        }

        /* High DPI displays - optimize images */
        @media (-webkit-min-device-pixel-ratio: 2), (min-resolution: 192dpi) {
            #intro-bg {
                image-rendering: -webkit-optimize-contrast;
                image-rendering: crisp-edges;
            }
        }

        /* Reduced motion preference */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }

            html {
                scroll-behavior: auto;
            }
        }

        /* Touch device optimizations */
        @media (hover: none) and (pointer: coarse) {
            #intro {
                cursor: pointer;
            }

            .nav-pill a,
            .hamburger {
                min-height: 44px;
                min-width: 44px;
            }

            .nav-pill a {
                padding: 10px 20px;
            }
        }
    </style>
</head>

<body>

    <!-- Navigation -->
    <nav id="mainNav">
        <a href="index.html" class="nav-logo">
            <span></span>Mosques
        </a>
        
        <div class="nav-pill">
            <a href="istiqlal.html">Istiqlal</a>
            <a href="kakbah.html">Ka'bah</a>
            <a href="egypt.html">Mesir</a>
            <a href="baiturrahman.html">Aceh</a>
        </div>
        
        <!-- Mobile Hamburger Menu -->
        <div class="hamburger" id="hamburger" aria-label="Toggle menu" role="button" tabindex="0">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <!-- Mobile Menu Overlay -->
    <div class="mobile-menu-overlay" id="mobileMenu">
        <a href="istiqlal.html">Istiqlal</a>
        <a href="kakbah.html">Ka'bah</a>
        <a href="egypt.html">Mesir</a>
        <a href="baiturrahman.html">Aceh</a>
    </div>

    <!-- Intro Section -->
    <div id="intro">
        <div id="intro-bg"></div>
        <div id="intro-overlay"></div>
        <div id="intro-noise"></div>

        <div id="intro-content">
            <h1 id="intro-title">LET'S EXPLORE</h1>
            <div id="intro-line"></div>
        </div>

        <div id="intro-hint">
            <span>Tap anywhere to continue</span>
            <div class="chevron-wrap">
                <div class="chevron" style="opacity:0.35;margin-bottom:-6px;"></div>
                <div class="chevron" style="opacity:0.65;margin-bottom:-6px;"></div>
                <div class="chevron" style="opacity:1;"></div>
            </div>
        </div>
    </div>

    <script>
        // ─── INTRO ANIMATION ───
        const intro = document.getElementById('intro');
        const mainNav = document.getElementById('mainNav');
        let triggered = false;

        function triggerExit() {
            if (triggered) return;
            triggered = true;

            // Show navigation before exiting
            mainNav.classList.add('visible');

            intro.classList.add('slide-out');

            intro.addEventListener('transitionend', function handler(e) {
                if (e.propertyName !== 'transform') return;
                intro.removeEventListener('transitionend', handler);
                window.location.href = 'baiturrahman.html';
            });
        }

        // Click to continue
        intro.addEventListener('click', triggerExit);

        // Touch/swipe support
        let touchStartY = 0;
        intro.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        intro.addEventListener('touchend', (e) => {
            const delta = touchStartY - e.changedTouches[0].clientY;
            if (delta > 40) triggerExit(); // swipe up
            else if (delta < 5 && delta > -5) triggerExit(); // tap
        }, { passive: true });

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (['Space', 'Enter', 'ArrowUp'].includes(e.code)) triggerExit();
        });

        // ─── MOBILE MENU TOGGLE ───
        const hamburger = document.getElementById('hamburger');
        const mobileMenu = document.getElementById('mobileMenu');
        const mobileLinks = mobileMenu.querySelectorAll('a');

        function toggleMobileMenu() {
            hamburger.classList.toggle('active');
            mobileMenu.classList.toggle('active');
            document.body.style.overflow = mobileMenu.classList.contains('active') ? 'hidden' : '';
        }

        function closeMobileMenu() {
            hamburger.classList.remove('active');
            mobileMenu.classList.remove('active');
            document.body.style.overflow = '';
        }

        // Hamburger click/tap
        hamburger.addEventListener('click', toggleMobileMenu);
        hamburger.addEventListener('keydown', (e) => {
            if (e.code === 'Enter' || e.code === 'Space') {
                e.preventDefault();
                toggleMobileMenu();
            }
        });

        // Close menu when clicking a link
        mobileLinks.forEach(link => {
            link.addEventListener('click', closeMobileMenu);
        });

        // Close menu on escape key
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Escape' && mobileMenu.classList.contains('active')) {
                closeMobileMenu();
            }
        });

        // Close menu on resize to desktop
        window.addEventListener('resize', () => {
            if (window.innerWidth > 900) {
                closeMobileMenu();
            }
        });
    </script>

</body>

</html>
